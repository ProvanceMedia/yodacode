# Yoda cron task definition. Copy this file to <task-name>.yaml and edit.
# The runner is workspace/bin/cron-runner.js — it reads this YAML, invokes
# the Claude Agent SDK, optionally posts the output to Slack, and optionally fires
# the skill + memory reflectors.

# Required
name: my-task                     # must match the filename (without .yaml)
prompt: |
  Plain-English task description for claude.
  Multi-line OK. {{today}} and ${ENV_VAR} substitutions work.

# Optional
description: One-line human description (shown in skill output, not used at runtime).

# Schedule. The in-container scheduler (workspace/bin/scheduler.js) reads this
# and fires the task on time — no host systemd. Prefer `schedule:` (standard
# 5-field cron); `on_calendar` (systemd syntax) is also accepted for common
# forms. Set `disabled: true` to keep a task but stop it running.
schedule: "0 9 * * *"          # 09:00 daily  (min hour dom mon dow)
# on_calendar: "*-*-* 09:00 Europe/London"   # alternative: systemd syntax
# disabled: true

# Model. REQUIRED — every cron yaml must state its model explicitly so you
# can see at a glance what it runs on. No implicit defaults.
# Common choices: claude-haiku-4-5 (cheap), claude-sonnet-4-6 (workhorse), claude-opus-4-8 (heavy judgement)
model: claude-sonnet-4-6

# Tools claude is allowed to use. Pick the smallest set the task actually needs.
allowed_tools: [Bash, Read, Write, Edit, WebFetch, WebSearch, Glob, Grep]

# Hard timeout in seconds. Default 600 (10 min). If the run exceeds this it is
# SIGTERM-killed (exit 143) and produces nothing. A heavy task — a deep model
# plus many tool/broker calls plus per-record web verification — needs more:
# bump to 1800 (30 min) so it isn't cut off mid-run.
timeout: 600

# Reasoning effort: low | medium | high | xhigh | max. Omit to use the model's
# default (high on Opus 4.7/4.8 and Sonnet 4.6). xhigh/max cost more quota per
# turn; no effect on Haiku. Replaces the old `thinking:` flag (a no-op on
# adaptive-reasoning models).
# effort: xhigh

# Optional bash command(s) to run BEFORE invoking claude. Useful for jitter
# sleeps, queue topups, anything that shouldn't burn agent turn quota.
# Default timeout: 1 hour (override with pre_hook_timeout: <seconds>).
# pre_hook: |
#   sleep $((RANDOM % 1800 + 600))
#   python3 bin/build-some-queue.py

# Optional auto-delivery. If omitted, output just goes to the log.
# deliver:
#   surface: slack
#   channel: C0123456789
#   # Optional format template. {{output}}, {{name}}, {{today}}, ${ENV_VAR} all work.
#   # If omitted, raw output is posted.
#   format: |
#     *{{name}}* — {{today}}
#
#     {{output}}

# Opt-in skill + memory reflection after a successful run.
# Honours YODA_SKILL_REFLECTOR_ENABLED and YODA_MEMORY_REFLECTOR_ENABLED.
reflect: true
