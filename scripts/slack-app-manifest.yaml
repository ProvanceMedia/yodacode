display_information:
  name: YodaCode
  description: Personal Claude-Code-powered chat agent
  background_color: "#1a1a1a"

features:
  bot_user:
    display_name: YodaCode
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  slash_commands:
    - command: /opus
      description: Ask YodaCode using Claude Opus (thread-sticky)
      usage_hint: your question
      should_escape: false
    - command: /sonnet
      description: Ask YodaCode using Claude Sonnet (thread-sticky)
      usage_hint: your question
      should_escape: false
    - command: /haiku
      description: Ask YodaCode using Claude Haiku (thread-sticky)
      usage_hint: your question
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read
      - reactions:read
      - reactions:write
      - files:read
      - files:write

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  interactivity:
    is_enabled: false
  socket_mode_enabled: true
  org_deploy_enabled: false
